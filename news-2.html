<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'none'; base-uri 'self'; form-action 'self';">
  <meta name="description" content="〇〇制度についての詳細ページです。">
  <title>〇〇制度について | 中種子町</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, "Yu Gothic", sans-serif;
      background: #f7f7f5;
      color: #2c2c2c;
      line-height: 1.8;
    }
    a { color: #1a6e3a; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page-header {
      background: linear-gradient(135deg, #1a6e3a 0%, #2d8a50 50%, #3aa060 100%);
      color: #fff;
      padding: 24px 20px;
    }
    .page-header h1 {
      margin: 0;
      font-size: 24px;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .article {
      background: #fff;
      border: 1px solid #d0e8d8;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .article h2 {
      margin-top: 0;
      font-size: 22px;
      color: #1a4a2e;
    }
    .article p {
      margin: 12px 0;
      color: #555;
      font-size: 15px;
    }
    .back-link {
      margin-top: 26px;
      display: inline-block;
      padding: 10px 16px;
      background: #e8f5e9;
      border: 1px solid #a5d6b0;
      border-radius: 8px;
      color: #1a4a2e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>新着情報</h1>
  </header>
  <main class="container">
    <article class="article">
      <p style="color:#888; font-size:15px; padding: 20px 0;">このページは現在準備中です。</p>
    </article>
    <p class="back-link"><a href="index.html">← ポータルに戻る</a></p>
  </main>
</body>
</html>
